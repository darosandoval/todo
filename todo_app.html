<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>To-Do</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, Helvetica, sans-serif;
      background: #f0f4f8;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }
    h1 { font-size: 28px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }
    .add-row {
      display: -webkit-flex; display: flex;
      gap: 8px; margin-bottom: 12px;
    }
    input[type=text] {
      -webkit-flex: 1; flex: 1;
      padding: 11px 14px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 10px;
      background: #fff; outline: none;
      -webkit-appearance: none;
    }
    select {
      padding: 11px 10px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 10px;
      background: #fff; color: #444;
      -webkit-appearance: none; outline: none;
    }
    .add-btn {
      padding: 11px 18px; font-size: 15px;
      background: #3b82f6; color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      -webkit-appearance: none; white-space: nowrap;
    }
    .filter-row {
      display: -webkit-flex; display: flex;
      gap: 8px; margin-bottom: 16px;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
    }
    .filter-btn {
      font-size: 13px; padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ccc; background: #fff;
      color: #555; cursor: pointer;
      -webkit-appearance: none;
    }
    .filter-btn.active {
      background: #3b82f6; color: #fff; border-color: #3b82f6;
    }
    .todo-list { list-style: none; }
    .todo-item {
      background: #fff; border-radius: 12px;
      border: 1px solid #e0e4ea;
      padding: 14px 16px; margin-bottom: 10px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: flex-start; align-items: flex-start;
      gap: 12px; position: relative;
    }
    .todo-item.done { opacity: 0.5; }
    .check-wrap { padding-top: 2px; }
    input[type=checkbox] {
      width: 20px; height: 20px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      border: 2px solid #bbb; border-radius: 5px;
      background: #fff; display: block;
    }
    input[type=checkbox]:checked {
      background: #3b82f6; border-color: #3b82f6;
    }
    input[type=checkbox]:checked::after {
      content: '';
      display: block; width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      margin: 2px auto 0 6px;
      -webkit-transform: rotate(45deg);
      transform: rotate(45deg);
    }
    .todo-text { -webkit-flex: 1; flex: 1; }
    .todo-label {
      font-size: 16px; line-height: 1.4;
      color: #1a1a1a; word-break: break-word;
    }
    .todo-item.done .todo-label {
      text-decoration: line-through; color: #aaa;
    }
    .todo-meta {
      font-size: 12px; color: #aaa; margin-top: 4px;
    }
    .cat-pill {
      display: inline-block; font-size: 11px;
      padding: 2px 8px; border-radius: 10px;
      margin-right: 6px; font-weight: 500;
    }
    .cat-work  { background: #dbeafe; color: #1e40af; }
    .cat-personal { background: #dcfce7; color: #166534; }
    .cat-shopping { background: #fef9c3; color: #854d0e; }
    .cat-other { background: #f3e8ff; color: #6b21a8; }
    .del-btn {
      background: none; border: none;
      color: #ccc; font-size: 18px; cursor: pointer;
      padding: 0 4px; line-height: 1; -webkit-appearance: none;
    }
    .del-btn:active { color: #e74c3c; }
    .empty {
      text-align: center; color: #aaa;
      font-size: 15px; padding: 32px 0;
    }
    .stats {
      font-size: 13px; color: #888;
      margin-bottom: 16px;
    }
    .clear-done {
      font-size: 13px; color: #e74c3c;
      background: none; border: none; cursor: pointer;
      padding: 0; -webkit-appearance: none; margin-left: 12px;
    }
  </style>
</head>
<body>
  <h1>To-Do</h1>
  <p class="subtitle" id="dateout"></p>

  <div class="add-row">
    <input type="text" id="new-task" placeholder="Add a task..." />
    <select id="cat-sel">
      <option value="personal">Personal</option>
      <option value="work">Work</option>
      <option value="shopping">Shopping</option>
      <option value="other">Other</option>
    </select>
    <button class="add-btn" id="add-btn">Add</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="active">Active</button>
    <button class="filter-btn" data-f="done">Done</button>
    <button class="filter-btn" data-f="work">Work</button>
    <button class="filter-btn" data-f="personal">Personal</button>
    <button class="filter-btn" data-f="shopping">Shopping</button>
  </div>

  <div class="stats">
    <span id="stats-txt"></span>
    <button class="clear-done" id="clear-done">Clear done</button>
  </div>

  <ul class="todo-list" id="todo-list"></ul>

  <script>
    var STORE_KEY = 'ipad_todos_v1';
    var todos = [];
    var filter = 'all';

    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var now = new Date();
    document.getElementById('dateout').textContent =
      days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

    function load() {
      try {
        var raw = localStorage.getItem(STORE_KEY);
        todos = raw ? JSON.parse(raw) : [];
      } catch(e) { todos = []; }
    }

    function save() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(todos)); } catch(e) {}
    }

    function uid() {
      return '' + Date.now() + Math.floor(Math.random() * 1000);
    }

    function fmt(ts) {
      var d = new Date(ts);
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' +
             (d.getHours() % 12 || 12) + ':' +
             (d.getMinutes() < 10 ? '0' : '') + d.getMinutes() +
             (d.getHours() < 12 ? ' AM' : ' PM');
    }

    function render() {
      var list = document.getElementById('todo-list');
      var visible = todos.filter(function(t) {
        if (filter === 'active')   return !t.done;
        if (filter === 'done')     return t.done;
        if (filter === 'work')     return t.cat === 'work';
        if (filter === 'personal') return t.cat === 'personal';
        if (filter === 'shopping') return t.cat === 'shopping';
        return true;
      });

      var done = todos.filter(function(t){ return t.done; }).length;
      document.getElementById('stats-txt').textContent =
        todos.length + ' task' + (todos.length !== 1 ? 's' : '') +
        ' — ' + done + ' done';

      if (visible.length === 0) {
        list.innerHTML = '<p class="empty">No tasks here.</p>';
        return;
      }

      var html = '';
      for (var i = 0; i < visible.length; i++) {
        var t = visible[i];
        html += '<li class="todo-item' + (t.done ? ' done' : '') + '" data-id="' + t.id + '">' +
          '<div class="check-wrap">' +
            '<input type="checkbox"' + (t.done ? ' checked' : '') + ' data-id="' + t.id + '" />' +
          '</div>' +
          '<div class="todo-text">' +
            '<div class="todo-label">' + escHtml(t.text) + '</div>' +
            '<div class="todo-meta">' +
              '<span class="cat-pill cat-' + t.cat + '">' + t.cat + '</span>' +
              'Added ' + fmt(t.ts) +
            '</div>' +
          '</div>' +
          '<button class="del-btn" data-id="' + t.id + '">&times;</button>' +
        '</li>';
      }
      list.innerHTML = html;

      var checks = list.querySelectorAll('input[type=checkbox]');
      for (var j = 0; j < checks.length; j++) {
        checks[j].addEventListener('change', onCheck);
      }
      var dels = list.querySelectorAll('.del-btn');
      for (var k = 0; k < dels.length; k++) {
        dels[k].addEventListener('click', onDel);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function onCheck(e) {
      var id = e.target.getAttribute('data-id');
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === id) { todos[i].done = e.target.checked; break; }
      }
      save(); render();
    }

    function onDel(e) {
      var id = e.target.getAttribute('data-id');
      todos = todos.filter(function(t){ return t.id !== id; });
      save(); render();
    }

    document.getElementById('add-btn').addEventListener('click', function() {
      var inp = document.getElementById('new-task');
      var text = inp.value.trim();
      if (!text) return;
      var cat = document.getElementById('cat-sel').value;
      todos.unshift({ id: uid(), text: text, cat: cat, done: false, ts: Date.now() });
      inp.value = '';
      save(); render();
    });

    document.getElementById('new-task').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) document.getElementById('add-btn').click();
    });

    document.getElementById('clear-done').addEventListener('click', function() {
      todos = todos.filter(function(t){ return !t.done; });
      save(); render();
    });

    var fbtns = document.querySelectorAll('.filter-btn');
    for (var fi = 0; fi < fbtns.length; fi++) {
      fbtns[fi].addEventListener('click', function(e) {
        filter = e.target.getAttribute('data-f');
        for (var x = 0; x < fbtns.length; x++) {
          fbtns[x].className = fbtns[x].getAttribute('data-f') === filter
            ? 'filter-btn active' : 'filter-btn';
        }
        render();
      });
    }

    load(); render();
  </script>
</body>
</html>
